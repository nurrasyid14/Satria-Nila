version: '3.8'

services:
  # 1. ML Service (Inference Engine)
  ml-service:
    build: ./services/ml-service
    container_name: satria-ml-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./services/ml-service:/app

  # 2. Data Service (Supabase Wrapper)
  data-service:
    build: ./services/data-service
    container_name: satria-data-service
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      - ./services/data-service:/app

  # 3. API Service (Gateway)
  api-service:
    build: ./services/api-service
    container_name: satria-api-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - ml-service
      - data-service
    volumes:
      - ./services/api-service:/app

networks:
  default:
    name: satria-network
